<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <!-- 고급 코딩 폰트 Fira Code 불러오기 -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #ffffff;
            /* Fira Code를 최우선으로 적용 */
            font-family: 'Fira Code', monospace;
            display: flex; justify-content: center; align-items: center;
            /* 글자를 더욱 날카롭게 표현 */
            -webkit-font-smoothing: antialiased;
        }

        .container { text-align: center; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        .text-item {
            font-size: 0.95rem;
            font-weight: 400; /* 코딩 폰트는 400일 때 가장 '진퉁' 느낌이 납니다 */
            color: #000;
            letter-spacing: -0.03em;
            cursor: pointer;
            transition: opacity 0.3s ease;
            user-select: none;
            text-decoration: none;
            display: block;
        }

        .menu-list {
            display: none;
            flex-direction: column;
            gap: 28px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .back-btn {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
            padding: 20px;
        }

        .text-item:active, .back-btn:active { opacity: 0.2; }
    </style>
</head>
<body>

    <div class="container">
        <div id="back-btn" class="back-btn" onclick="hideMenu()">&lt;</div>
        <div id="main-title" class="text-item" onclick="showMenu()">earring1</div>
        <div id="menu-list" class="menu-list">
            <a href="#" class="text-item">ad</a>
            <a href="#" class="text-item">info</a>
            <a href="#" class="text-item">buy</a>
        </div>
    </div>

    <script>
        const title = document.getElementById('main-title');
        const menu = document.getElementById('menu-list');
        const backBtn = document.getElementById('back-btn');

        function showMenu() {
            title.style.opacity = '0';
            setTimeout(() => {
                title.style.display = 'none';
                menu.style.display = 'flex';
                backBtn.style.display = 'block';
                setTimeout(() => {
                    menu.style.opacity = '1';
                    backBtn.style.opacity = '1';
                }, 50);
            }, 300);
        }

        function hideMenu() {
            menu.style.opacity = '0';
            backBtn.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                backBtn.style.display = 'none';
                title.style.display = 'block';
                setTimeout(() => {
                    title.style.opacity = '1';
                }, 50);
            }, 300);
        }
    </script>
</body>
</html>
