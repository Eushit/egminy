<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <!-- Futura를 완벽히 계승한 Jost 폰트의 가장 얇은 100 두께 -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #ffffff;
            /* Jost는 Futura와 골격이 거의 일치합니다 */
            font-family: 'Jost', 'Futura', sans-serif;
            display: flex; justify-content: center; align-items: center;
            /* 렌더링을 더 가늘게 만듭니다 */
            -webkit-font-smoothing: antialiased;
        }
        .product-name {
            font-size: 1.1rem;
            font-weight: 100; /* 극강의 얇음 */
            color: #1d1d1f;
            letter-spacing: 0.02em; /* Futura는 자간이 좀 있어야 제맛입니다 */
            text-transform: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="product-name">light earring</div>
</body>
</html>
