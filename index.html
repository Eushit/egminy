<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <link rel="stylesheet" as="style" crossorigin href="https://jsdelivr.net" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: #1d1d1f;
        }
        /* 제품 리스트 컨테이너 */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 30px; /* 제품 간의 간격 */
            padding: 40px 20px;
        }
        /* 개별 제품 가로 레이아웃 */
        .product-card {
            display: flex;
            align-items: center; /* 사진과 텍스트 중앙 정렬 */
            gap: 20px; /* 사진과 이름 사이의 간격 */
            cursor: pointer;
            text-decoration: none;
        }
        /* 제품 사진 스타일 */
        .product-image {
            width: 80px; /* 사진 크기를 작고 정갈하게 조절 */
            height: 80px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background-color: #f5f5f7;
            transition: opacity 0.3s;
        }
        .product-card:active .product-image {
            opacity: 0.7;
        }
        /* 제품 이름 스타일 */
        .product-name {
            font-size: 1rem;
            font-weight: 320; /* 확정하신 세련된 두께 */
            color: #1d1d1f;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <div class="product-list">
        <!-- 첫 번째 제품 -->
        <div class="product-card">
            <!-- 이미지 준비 전까지는 회색 박스로 보입니다 -->
            <img src="1.jpeg" alt="Light Earring" class="product-image">
            <p class="product-name">Light Earring</p>
        </div>

        <!-- 제품 추가 시 아래 블록 복사 -->
        <!-- 
        <div class="product-card">
            <img src="이미지주소" class="product-image">
            <p class="product-name">Next Product</p>
        </div> 
        -->
    </div>

</body>
</html>
