<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <!-- 고전 폰트 불러오기 -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 50px;
            text-align: center;
        }
        .link-text {
            font-size: 1.4rem;
            color: #1d1d1f;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        .link-text:active, .link-text:hover {
            color: #86868b;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="link-text">BUY</a>
        <a href="#" class="link-text">CONTACT</a>
    </div>

</body>
