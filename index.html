
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        .container { display: flex; flex-direction: column; gap: 45px; text-align: center; }
        .link-text {
            font-size: 1.1rem;
            font-weight: 300;
            color: #1d1d1f;
            text-decoration: none;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* 글자와 기호 사이 간격 */
            transition: opacity 0.3s ease;
        }
        .link-text:active { opacity: 0.5; }
        /* 고전 기호 스타일 */
        .symbol {
            font-size: 1.3rem;
            color: #86868b; /* 기호는 조금 연하게 */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 유니코드 특수기호를 활용해 원시적이고 신비로운 느낌 연출 -->
        <a href="#" class="link-text">
            <span class="symbol">⌬</span> BUY <span class="symbol">⌬</span>
        </a>
        <a href="#" class="link-text">
            <span class="symbol">𐇐</span> CONTACT <span class="symbol">𐇐</span>
        </a>
    </div>

</body>
</html>
