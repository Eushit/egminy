<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <!-- 고전 학술용 Cardo 폰트 불러오기 -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cardo:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #ffffff;
            font-family: 'Cardo', serif; /* 정통 고서 스타일 서체 적용 */
            display: flex; justify-content: center; align-items: center;
        }
        .container { display: flex; flex-direction: column; gap: 35px; text-align: center; }
        .link-text {
            font-size: 1.3rem;
            font-style: italic; /* 이탤릭체를 쓰면 훨씬 더 고전적인 서신 느낌이 납니다 */
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }
        .link-text:active { color: #b8860b; /* 터치 시 고풍스러운 다크골드 색상으로 변경 */ }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="link-text">Buy</a>
        <a href="#" class="link-text">Contact</a>
    </div>

</body>
</html>
