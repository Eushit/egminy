<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #ffffff;
            font-family: 'Fira Code', monospace;
            display: flex; justify-content: center; align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .container { text-align: center; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        .text-item {
            font-size: 0.95rem; font-weight: 400; color: #000;
            letter-spacing: 0.01em; cursor: pointer;
            transition: opacity 0.4s ease; user-select: none;
            text-decoration: none; display: block;
        }

        .menu-list {
            display: none; flex-direction: column; align-items: center;
            gap: 28px; opacity: 0; transition: opacity 0.6s ease;
        }

        /* 버튼이 들어갈 자리: 하얀 화면 방지용 최소 높이 */
        #paypal-container-LS9ECARQQY8ES {
            display: none; width: 280px; min-height: 150px; opacity: 0; transition: opacity 0.6s ease;
            z-index: 10;
        }

        .back-btn {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            font-size: 1.1rem; color: #000; cursor: pointer;
            opacity: 0; transition: opacity 0.5s ease; display: none; padding: 20px;
            z-index: 20;
        }
        
        .text-item:active, .back-btn:active { opacity: 0.2; }
    </style>
</head>
<body>

    <div class="container">
        <div id="back-btn" class="back-btn" onclick="handleBack()">&lt;</div>
        <div id="main-title" class="text-item" onclick="showMenu()">earring1</div>

        <div id="menu-list" class="menu-list">
            <a href="#" class="text-item">ad</a>
            <a href="#" class="text-item">info</a>
            <div class="text-item" onclick="showPayPal()">buy</div>
        </div>

        <!-- 페이팔 버튼 컨테이너 -->
        <div id="paypal-container-LS9ECARQQY8ES"></div>
    </div>

    <!-- [핵심] 페이팔 SDK를 설정창 대신 HTML에 직접 삽입 -->
    <script src="https://paypal.com"></script>

    <script>
        const title = document.getElementById('main-title');
        const menu = document.getElementById('menu-list');
        const backBtn = document.getElementById('back-btn');
        const paypalContainer = document.getElementById('paypal-container-LS9ECARQQY8ES');

        function handleBack() {
            if (paypalContainer.style.display === 'block') {
                hidePayPal();
            } else {
                hideMenu();
            }
        }

        function showMenu() {
            title.style.opacity = '0';
            setTimeout(() => {
                title.style.display = 'none';
                menu.style.display = 'flex';
                backBtn.style.display = 'block';
                setTimeout(() => {
                    menu.style.opacity = '1';
                    backBtn.style.opacity = '1';
                }, 50);
            }, 400);
        }

        function hideMenu() {
            menu.style.opacity = '0';
            backBtn.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                backBtn.style.display = 'none';
                title.style.display = 'block';
                setTimeout(() => {
                    title.style.opacity = '1';
                }, 50);
            }, 400);
        }

        function showPayPal() {
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                paypalContainer.style.display = 'block';
                setTimeout(() => {
                    paypalContainer.style.opacity = '1';
                }, 50);
            }, 400);
        }

        function hidePayPal() {
            paypalContainer.style.opacity = '0';
            setTimeout(() => {
                paypalContainer.style.display = 'none';
                menu.style.display = 'flex';
                setTimeout(() => {
                    menu.style.opacity = '1';
                }, 50);
            }, 400);
        }

        // 버튼 렌더링 함수: 스크립트 로딩 완료 시까지 반복 체크
        function renderPayPal() {
            if (typeof paypal !== 'undefined' && paypal.HostedButtons) {
                paypal.HostedButtons({
                    hostedButtonId: "LS9ECARQQY8ES",
                }).render("#paypal-container-LS9ECARQQY8ES");
                console.log("PayPal Button Rendered!");
            } else {
                console.log("Waiting for PayPal SDK...");
                setTimeout(renderPayPal, 500);
            }
        }

        renderPayPal();
    </script>
</body>
</html>
